<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD-Rank 3D 对流-扩散演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; }
  
  #canvas-container { width: 100vw; height: 100vh; position: relative; }
  
  /* 控制面板 */
  #controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(15, 15, 35, 0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(100, 200, 255, 0.15); border-radius: 16px;
    padding: 24px; width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #controls h2 { 
    font-size: 18px; margin-bottom: 16px;
    background: linear-gradient(135deg, #64b5f6, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
  .ctrl-group { margin-bottom: 14px; }
  .ctrl-group label { font-size: 12px; color: #90a4ae; display: block; margin-bottom: 6px; }
  .ctrl-group input[type="range"] {
    width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
    background: rgba(100, 200, 255, 0.15); border-radius: 3px; outline: none;
  }
  .ctrl-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: linear-gradient(135deg, #64b5f6, #42a5f5); cursor: pointer;
    box-shadow: 0 0 10px rgba(100, 180, 255, 0.5);
  }
  .ctrl-value { float: right; font-size: 12px; color: #64b5f6; font-weight: 600; }
  
  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.3s; margin-bottom: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #1e88e5, #7c4dff);
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(30, 136, 229, 0.4); }
  .btn-secondary {
    background: rgba(100, 200, 255, 0.1);
    color: #90caf9; border: 1px solid rgba(100, 200, 255, 0.2);
  }
  .btn-secondary:hover { background: rgba(100, 200, 255, 0.2); }
  
  /* 状态显示 */
  #status {
    position: fixed; bottom: 20px; left: 20px; z-index: 100;
    background: rgba(15, 15, 35, 0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(100, 200, 255, 0.15); border-radius: 16px;
    padding: 20px; min-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #status h3 { font-size: 14px; color: #64b5f6; margin-bottom: 10px; }
  .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .stat-label { color: #78909c; }
  .stat-val { color: #e0e0e0; font-weight: 600; font-family: 'Courier New', monospace; }
  .stat-val.high { color: #ef5350; }
  .stat-val.mid { color: #ffd54f; }
  .stat-val.low { color: #66bb6a; }
  
  /* 标题 */
  #title {
    position: fixed; top: 20px; left: 20px; z-index: 100;
  }
  #title h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #64b5f6, #ce93d8, #f48fb1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #title p { font-size: 13px; color: #546e7a; margin-top: 4px; }
  
  /* 图例 */
  #legend {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(15, 15, 35, 0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(100, 200, 255, 0.15); border-radius: 16px;
    padding: 16px; font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  
  /* 阶段指示器 */
  #phase {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 200; font-size: 36px; font-weight: 800; pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
    text-shadow: 0 0 40px rgba(100, 180, 255, 0.5);
    background: linear-gradient(135deg, #64b5f6, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">
  <h1>AD-Rank 3D Demo</h1>
  <p>对流-扩散图排序 · 通用向量检索增强算法</p>
</div>

<div id="controls">
  <h2>⚙️ 参数控制</h2>
  
  <div class="ctrl-group">
    <label>扩散系数 D <span class="ctrl-value" id="d-val">0.15</span></label>
    <input type="range" id="diffusion" min="0" max="50" value="15">
  </div>
  <div class="ctrl-group">
    <label>对流强度 |u| <span class="ctrl-value" id="u-val">0.30</span></label>
    <input type="range" id="advection" min="0" max="100" value="30">
  </div>
  <div class="ctrl-group">
    <label>迭代速度 <span class="ctrl-value" id="speed-val">1.0x</span></label>
    <input type="range" id="speed" min="1" max="30" value="10">
  </div>

  <button class="btn btn-primary" id="btn-start">▶ 开始对流-扩散</button>
  <button class="btn btn-secondary" id="btn-reset">↺ 重置场景</button>
  <button class="btn btn-secondary" id="btn-toggle">切换：仅扩散 / 对流+扩散</button>
</div>

<div id="status">
  <h3>📊 实时状态</h3>
  <div class="stat-row"><span class="stat-label">迭代步数</span><span class="stat-val" id="s-iter">0</span></div>
  <div class="stat-row"><span class="stat-label">雷诺数 Re</span><span class="stat-val" id="s-re">0.00</span></div>
  <div class="stat-row"><span class="stat-label">模式</span><span class="stat-val" id="s-mode">对流 + 扩散</span></div>
  <div class="stat-row"><span class="stat-label">汇聚点</span><span class="stat-val" id="s-conv">0</span></div>
  <div class="stat-row"><span class="stat-label">发散点</span><span class="stat-val" id="s-div">0</span></div>
  <div class="stat-row"><span class="stat-label">Top-1 文档</span><span class="stat-val" id="s-top">-</span></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ffd54f;box-shadow:0 0 8px #ffd54f"></div>Query (查询点)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#66bb6a"></div>低浓度 (低相关度)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef5350;box-shadow:0 0 6px #ef5350"></div>高浓度 (高相关度)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#42a5f5"></div>对流方向 →</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.2)"></div>图的边 (KNN连接)</div>
</div>

<div id="phase"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === 场景设置 ===
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(12, 8, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// === 灯光 ===
scene.add(new THREE.AmbientLight(0x304060, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);

// === 背景粒子 ===
const bgGeo = new THREE.BufferGeometry();
const bgPositions = new Float32Array(2000 * 3);
for (let i = 0; i < 2000; i++) {
  bgPositions[i * 3] = (Math.random() - 0.5) * 60;
  bgPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
  bgPositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
const bgMat = new THREE.PointsMaterial({ color: 0x334466, size: 0.08, transparent: true, opacity: 0.5 });
scene.add(new THREE.Points(bgGeo, bgMat));

// === 文档节点数据 ===
const DOC_NAMES = [
  '劳动合同法§47', '劳动合同法§87', '劳动合同法§14', '民法典§577',
  '劳动合同法§36', '社会保险法§12', '劳动法§28', '民法典§186',
  '劳动合同法§46', '公司法§71', '劳动争议调解§5', '个税法§6',
  '劳动合同法§39', '民法典§509', '劳动合同法§82', '就业促进法§3',
  '安全生产法§4', '工伤保险条例§14', '劳动合同法§10', '民法典§1165'
];
const N = DOC_NAMES.length;

// 生成 3D 位置（模拟 PCA 降维后的展示位置）
const docPositions = [];
for (let i = 0; i < N; i++) {
  const theta = (i / N) * Math.PI * 2 + Math.random() * 0.5;
  const r = 3 + Math.random() * 4;
  const y = (Math.random() - 0.5) * 5;
  docPositions.push(new THREE.Vector3(
    r * Math.cos(theta) + (Math.random() - 0.5) * 2,
    y,
    r * Math.sin(theta) + (Math.random() - 0.5) * 2
  ));
}

// Query 位置
const queryPos = new THREE.Vector3(0, 0, 0);

// 初始浓度（cosine similarity 模拟）
let concentration = new Float32Array(N);
const initialSim = new Float32Array(N);
for (let i = 0; i < N; i++) {
  const dist = docPositions[i].distanceTo(queryPos);
  initialSim[i] = Math.max(0, 1 - dist / 10);
  concentration[i] = initialSim[i];
}

// 建 KNN 图
const K_NN = 4;
const edges = [];
const adjacency = Array.from({ length: N }, () => []);

for (let i = 0; i < N; i++) {
  const dists = [];
  for (let j = 0; j < N; j++) {
    if (i !== j) dists.push({ j, d: docPositions[i].distanceTo(docPositions[j]) });
  }
  dists.sort((a, b) => a.d - b.d);
  for (let k = 0; k < K_NN; k++) {
    const j = dists[k].j;
    const w = Math.exp(-dists[k].d * 0.5);
    if (!adjacency[i].some(e => e.j === j)) {
      adjacency[i].push({ j, w });
      adjacency[j].push({ j: i, w });
      edges.push([i, j, w]);
    }
  }
}

// === 3D 对象创建 ===

// 文档节点球体
const docMeshes = [];
const docLabels = [];
for (let i = 0; i < N; i++) {
  const geo = new THREE.SphereGeometry(0.22, 24, 24);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x66bb6a, emissive: 0x224422,
    roughness: 0.3, metalness: 0.1,
    transparent: true, opacity: 0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(docPositions[i]);
  scene.add(mesh);
  docMeshes.push(mesh);

  // 光晕
  const glowGeo = new THREE.SphereGeometry(0.35, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x66bb6a, transparent: true, opacity: 0.1
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  mesh.add(glow);
  mesh.userData.glow = glow;

  // 文本标签用 sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0, 0, 0, 0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = '600 22px Inter, sans-serif';
  ctx.fillStyle = '#b0bec5';
  ctx.textAlign = 'center';
  ctx.fillText(DOC_NAMES[i], 128, 40);
  
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.7 });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(docPositions[i].x, docPositions[i].y + 0.5, docPositions[i].z);
  sprite.scale.set(2.5, 0.6, 1);
  scene.add(sprite);
  docLabels.push(sprite);
}

// Query 节点
const queryGeo = new THREE.IcosahedronGeometry(0.35, 2);
const queryMat = new THREE.MeshPhysicalMaterial({
  color: 0xffd54f, emissive: 0x665500,
  roughness: 0.2, metalness: 0.3
});
const queryMesh = new THREE.Mesh(queryGeo, queryMat);
queryMesh.position.copy(queryPos);
scene.add(queryMesh);

// Query 光晕
const qGlowGeo = new THREE.SphereGeometry(0.6, 16, 16);
const qGlowMat = new THREE.MeshBasicMaterial({
  color: 0xffd54f, transparent: true, opacity: 0.15
});
queryMesh.add(new THREE.Mesh(qGlowGeo, qGlowMat));

// Query 标签
{
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = '700 28px Inter, sans-serif';
  ctx.fillStyle = '#ffd54f';
  ctx.textAlign = 'center';
  ctx.fillText('📍 Query: "劳动合同赔偿"', 256, 44);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.position.set(0, 0.8, 0);
  sprite.scale.set(4, 0.5, 1);
  scene.add(sprite);
}

// 图的边
const edgeLines = [];
for (const [i, j, w] of edges) {
  const geo = new THREE.BufferGeometry().setFromPoints([docPositions[i], docPositions[j]]);
  const mat = new THREE.LineBasicMaterial({
    color: 0x455a64, transparent: true, opacity: 0.15 + w * 0.3
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  edgeLines.push({ line, i, j, w, mat });
}

// 对流箭头
const arrowGroup = new THREE.Group();
scene.add(arrowGroup);

function createArrows() {
  while (arrowGroup.children.length) arrowGroup.remove(arrowGroup.children[0]);
  
  for (const [i, j, w] of edges) {
    const dir = new THREE.Vector3().subVectors(docPositions[j], docPositions[i]);
    const qDir = new THREE.Vector3().subVectors(queryPos, docPositions[i]).normalize();
    const proj = dir.dot(qDir);
    
    if (proj > 0.3) {
      const mid = new THREE.Vector3().addVectors(docPositions[i], docPositions[j]).multiplyScalar(0.5);
      const arrowDir = qDir.clone().multiplyScalar(0.4);
      
      const arrowGeo = new THREE.ConeGeometry(0.06, 0.25, 8);
      const arrowMat = new THREE.MeshBasicMaterial({
        color: 0x42a5f5, transparent: true, opacity: 0.6
      });
      const arrow = new THREE.Mesh(arrowGeo, arrowMat);
      arrow.position.copy(mid);
      arrow.lookAt(mid.clone().add(arrowDir));
      arrow.rotateX(Math.PI / 2);
      arrowGroup.add(arrow);
    }
  }
}

// 流线粒子
const PARTICLE_COUNT = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleSpeeds = new Float32Array(PARTICLE_COUNT);
const particleLifes = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 14;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 8;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 14;
  particleSpeeds[i] = 0.02 + Math.random() * 0.03;
  particleLifes[i] = Math.random();
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x42a5f5, size: 0.06, transparent: true, opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// === 状态变量 ===
let isRunning = false;
let iteration = 0;
let useAdvection = true;
let D_coeff = 0.15;
let U_strength = 0.3;
let simSpeed = 1.0;

// === 对流-扩散求解器 ===
function solveStep() {
  const newC = new Float32Array(N);
  const dt = 0.05 * simSpeed;
  
  for (let i = 0; i < N; i++) {
    let diffusionTerm = 0;
    let advectionTerm = 0;
    
    // 扩散项: D * Σ w_ij * (C_j - C_i)
    for (const { j, w } of adjacency[i]) {
      diffusionTerm += w * (concentration[j] - concentration[i]);
    }
    diffusionTerm *= D_coeff;
    
    // 对流项: u · ∇C（使用 upwind 格式）
    if (useAdvection) {
      const toQuery = new THREE.Vector3().subVectors(queryPos, docPositions[i]).normalize();
      for (const { j, w } of adjacency[i]) {
        const edgeDir = new THREE.Vector3().subVectors(docPositions[j], docPositions[i]).normalize();
        const uDotEdge = toQuery.dot(edgeDir) * U_strength;
        if (uDotEdge > 0) {
          advectionTerm -= uDotEdge * (concentration[j] - concentration[i]) * w;
        }
      }
    }
    
    newC[i] = concentration[i] + dt * (diffusionTerm + advectionTerm);
    newC[i] = Math.max(0, Math.min(1, newC[i]));
  }
  
  concentration = newC;
  iteration++;
}

// === 可视化更新 ===
function updateVisualization() {
  let maxC = 0, maxIdx = 0;
  let convCount = 0, divCount = 0;
  let advMag = 0, diffMag = 0;
  
  for (let i = 0; i < N; i++) {
    const c = concentration[i];
    if (c > maxC) { maxC = c; maxIdx = i; }
    
    // 颜色映射: 绿(低) → 黄(中) → 红(高)
    const r = Math.min(1, c * 2.5);
    const g = Math.max(0, 1 - c * 1.5) * 0.7 + 0.3 * c;
    const b = Math.max(0, 0.4 - c);
    
    const color = new THREE.Color(r, g, b);
    docMeshes[i].material.color.copy(color);
    docMeshes[i].material.emissive.copy(color).multiplyScalar(0.4);
    
    // 大小随浓度变化
    const scale = 0.8 + c * 1.2;
    docMeshes[i].scale.setScalar(scale);
    
    // 光晕
    docMeshes[i].userData.glow.material.color.copy(color);
    docMeshes[i].userData.glow.material.opacity = c * 0.3;
    
    // 统计汇聚/发散
    let flowIn = 0, flowOut = 0;
    for (const { j, w } of adjacency[i]) {
      const diff = concentration[j] - concentration[i];
      if (diff > 0.02) flowIn++;
      if (diff < -0.02) flowOut++;
    }
    if (flowIn > flowOut + 1) convCount++;
    if (flowOut > flowIn + 1) divCount++;
    
    // 计算 Re
    for (const { j, w } of adjacency[i]) {
      diffMag += Math.abs(D_coeff * w * (concentration[j] - concentration[i]));
      if (useAdvection) {
        const toQ = new THREE.Vector3().subVectors(queryPos, docPositions[i]).normalize();
        const eDir = new THREE.Vector3().subVectors(docPositions[j], docPositions[i]).normalize();
        advMag += Math.abs(toQ.dot(eDir) * U_strength * w * (concentration[j] - concentration[i]));
      }
    }
  }
  
  // 边的颜色更新
  for (const { line, i, j, mat } of edgeLines) {
    const flow = Math.abs(concentration[i] - concentration[j]);
    mat.opacity = 0.1 + flow * 2;
    mat.color.setHSL(0.55 - flow * 0.5, 0.7, 0.4 + flow * 0.3);
  }
  
  // 更新 UI
  const re = diffMag > 0.001 ? advMag / diffMag : 0;
  document.getElementById('s-iter').textContent = iteration;
  const reEl = document.getElementById('s-re');
  reEl.textContent = re.toFixed(2);
  reEl.className = 'stat-val ' + (re > 2 ? 'high' : re > 0.5 ? 'mid' : 'low');
  document.getElementById('s-mode').textContent = useAdvection ? '对流 + 扩散' : '仅扩散';
  document.getElementById('s-conv').textContent = convCount;
  document.getElementById('s-div').textContent = divCount;
  document.getElementById('s-top').textContent = DOC_NAMES[maxIdx];
}

// === 流线粒子动画 ===
function updateParticles() {
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const px = pos[i * 3], py = pos[i * 3 + 1], pz = pos[i * 3 + 2];
    
    // 向 query 方向流动
    const dx = -px * 0.003 * U_strength;
    const dy = -py * 0.002 * U_strength;
    const dz = -pz * 0.003 * U_strength;
    
    // 加扩散噪声
    pos[i * 3] += dx + (Math.random() - 0.5) * D_coeff * 0.3;
    pos[i * 3 + 1] += dy + (Math.random() - 0.5) * D_coeff * 0.3;
    pos[i * 3 + 2] += dz + (Math.random() - 0.5) * D_coeff * 0.3;
    
    particleLifes[i] -= 0.003;
    if (particleLifes[i] < 0 || Math.sqrt(px*px + py*py + pz*pz) < 0.5) {
      pos[i * 3] = (Math.random() - 0.5) * 14;
      pos[i * 3 + 1] = (Math.random() - 0.5) * 8;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 14;
      particleLifes[i] = 1;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;
}

// === 控件绑定 ===
document.getElementById('diffusion').oninput = e => {
  D_coeff = e.target.value / 100;
  document.getElementById('d-val').textContent = D_coeff.toFixed(2);
};
document.getElementById('advection').oninput = e => {
  U_strength = e.target.value / 100;
  document.getElementById('u-val').textContent = U_strength.toFixed(2);
};
document.getElementById('speed').oninput = e => {
  simSpeed = e.target.value / 10;
  document.getElementById('speed-val').textContent = simSpeed.toFixed(1) + 'x';
};

document.getElementById('btn-start').onclick = () => {
  isRunning = !isRunning;
  document.getElementById('btn-start').textContent = isRunning ? '⏸ 暂停' : '▶ 开始对流-扩散';
  if (isRunning && iteration === 0) {
    createArrows();
    showPhase('开始求解...');
  }
};

document.getElementById('btn-reset').onclick = () => {
  isRunning = false;
  iteration = 0;
  for (let i = 0; i < N; i++) concentration[i] = initialSim[i];
  document.getElementById('btn-start').textContent = '▶ 开始对流-扩散';
  updateVisualization();
  showPhase('已重置');
};

document.getElementById('btn-toggle').onclick = () => {
  useAdvection = !useAdvection;
  showPhase(useAdvection ? '对流 + 扩散模式' : '仅扩散模式');
  if (useAdvection) {
    createArrows();
    arrowGroup.visible = true;
    particleMat.opacity = 0.4;
  } else {
    arrowGroup.visible = false;
    particleMat.opacity = 0.15;
  }
};

function showPhase(text) {
  const el = document.getElementById('phase');
  el.textContent = text;
  el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, 1500);
}

// === Query 脉动动画 ===
let time = 0;

// === 主循环 ===
let frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  frameCount++;
  
  controls.update();
  
  // Query 脉动
  const pulse = 1 + Math.sin(time * 3) * 0.1;
  queryMesh.scale.setScalar(pulse);
  queryMesh.rotation.y += 0.01;
  
  // 求解
  if (isRunning && frameCount % 3 === 0) {
    solveStep();
    updateVisualization();
  }
  
  // 粒子
  if (isRunning) updateParticles();
  
  renderer.render(scene, camera);
}

// 窗口 resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 启动
updateVisualization();
animate();

</script>
</body>
</html>
